<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0%;
            padding: 0%;
        }
    </style>
</head>
<body>
    <form action="#" name="form" style="width: 400px; height: 400px; display: flex; justify-content: center;">
        <fieldset>
            Name: <br>
            <input type="text" name="name"><br> <br>
            Email: <br>
            <input type="email" name="email"> <br> <br>
            Address: <br>
            <textarea name="address" id=""></textarea> <br> <br>
            Curse: <br>
            <select name="curse" id="">
                <option name="curse" value="CSE">CSE</option>
                <option name="curse" value="EEE">EEE</option>
                <option name="curse" value="MBA">MBA</option>
            </select> <br> <br>
            Gender: <br>
            <input type="radio" name="gender" value="Male">Male
            <input type="radio" name="gender" value="Female">Female
            <br> <br>
            Education: <br>
            <input type="checkbox" name="education" value="SSC">SSC
            <input type="checkbox" name="education" value="HSC">HSC
            <input type="checkbox" name="education" value="BSC">BSC
            <br> <br>
            <input type="submit" value="Submit" onclick="info()">
            <input type="reset">
        </fieldset>
    </form>

    <script>
        function info(){
            let name = document.form.name.value;
            let email = document.form.email.value;
            let address = document.form.address.value;
            let curse = document.form.curse.value;
            let gender = "";
            let education = "";

            store = window.open("","", "width=300,height=300");
            for(let i=0; i<document.form.gender.length; i++){
                if(document.form.gender[i].checked){
                    gender= document.form.gender[i].value+ ""
                }

            }

            for(let i=0; i<document.form.education.length; i++){
                if(document.form.education[i].checked){
                    education += document.form.education[i].value +","
                }
            }
            store.document.write("Student Name:" + name + "<br>");
            store.document.write("Student Email:" + email + "<br>");
            store.document.write("Student Address:" + address + "<br>");
            store.document.write("Student Gender:" + gender + "<br>");
            store.document.write("Student Education:" + education + "<br>");

        }
    </script>
</body>
</html>
