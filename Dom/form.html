<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form action="#" name="f">
        Name :
         <br>
         <input type="text" name="n"> <br>
         Address : <br>
         <textarea name="address" id=""></textarea> <br>
         Round: 
         <select name="round" id="">
            <option value="70">70</option>
            <option value="71">71</option>
            <option value="72">72</option>
            <option value="73">73</option>
         </select>
         <br>
         Curse:
         <input type="checkbox" name="curse" value="SSC">SSC
         <input type="checkbox" name="curse" value="HSC">HSC
         <input type="checkbox" name="curse" value="Diploma">Diploma
         <input type="checkbox" name="curse" value="BSC">BSC <br> <br>

         Department:
         <input type="radio" name="dpt" value="CSE">CSE
         <input type="radio" name="dpt" value="EEE">EEE
         <input type="radio" name="dpt" value="MARINE">MARINE


         <input type="submit" value="Submit" onclick="info()">
         <input type="reset">
    </form>

    <script>
        function info(){
          let   name = document.f.n.value;
          let   address = document.f.address.value;
          let round = document.f.round.value;
          let curse = "";
          let dpt = "";
          let store =   window.open("","","width=400px, height=400px");

          for(i=0; i < document.f.curse.length; i++){
            if(document.f.curse[i].checked){
                curse += document.f.curse[i].value + ",";
            }
          }

          for( i=0; i< document.f.dpt.length; i++){
            if(document.f.dpt[i].checked){
                dpt= document.f.dpt[i].value + ",";
            }
          }
          store.document.write("Student Name :" + name + "<br>");
          store.document.write("Student Address :" + address + "<br>");
          store.document.write("Round: " + round +  "<br>");
          store.document.write("Curse: "+ curse);
          store.document.write("Department: "+ dpt);
          
        }
    </script>
</body>
</html>
